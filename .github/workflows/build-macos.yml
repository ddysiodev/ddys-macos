name: Build macOS app and DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing or new release tag to upload macOS assets to
        required: true
        default: v0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ddys-macos-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: macOS ${{ matrix.label }}
    runs-on: macos-latest
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
          - label: Intel
            target: x86_64-apple-darwin
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.29.2 --activate
          pnpm --version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> src-tauri/target"

      - name: Install dependencies
        run: pnpm install --lockfile=false

      - name: Verify source package
        run: pnpm run test

      - name: Build and upload macOS assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ddys-macos ${{ env.RELEASE_TAG }}
          releaseBody: Automated unsigned macOS .app and .dmg builds for DDYS macOS.
          releaseDraft: false
          prerelease: false
          releaseAssetNamePattern: ddys-macos-[version]-[platform]-[arch]-[bundle][ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ddys-macos-[platform]-[arch]-[bundle]
